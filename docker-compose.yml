# Root docker-compose - delegates to docker/ directory
# Usage:
#   docker compose up -d                                          (base: postgres + redis)
#   docker compose -f docker/docker-compose.dev.yml up -d         (add pgadmin + redis-commander)
#
# Or use the Makefile:
#   make dev-up       (base services)
#   make dev-up-full  (base + dev tools)

include:
  - docker/docker-compose.yml
