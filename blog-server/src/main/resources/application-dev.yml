spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/blog
    username: blog
    password: blog

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.blog: DEBUG
    org.springframework.security: DEBUG
